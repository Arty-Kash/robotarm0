<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Robot Arm RL Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #2c3e50; color: #ecf0f1; font-family: sans-serif; overflow: hidden; }
        .container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box; }
        .panel { background-color: #34495e; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #455a64; }
        .panel-header { padding: 8px 12px; background-color: #1a252f; font-size: 0.9em; font-weight: bold; color: #bdc3c7; }
        .panel-content { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background-color: #fff; }
        #log-container { width: 100%; height: 100%; padding: 10px; box-sizing: border-box; font-family: monospace; font-size: 0.85em; overflow-y: auto; color: #2ecc71; text-align: left; }
        #stat-display { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左上：シミュレーション -->
        <div class="panel">
            <div class="panel-header">ROBOT SIMULATION (Meshcat)</div>
            <div class="panel-content">
                <!-- srcは空にしておきます。JSが自動で設定します -->
                <iframe id="meshcat-iframe" src=""></iframe>
            </div>
        </div>
        <!-- 右上：グラフ（予定） -->
        <div class="panel">
            <div class="panel-header">REWARD HISTORY</div>
            <div class="panel-content"><div>(Graph Coming Soon)</div></div>
        </div>
        <!-- 左下：統計 -->
        <div class="panel">
            <div class="panel-header">STATISTICS</div>
            <div class="panel-content">
                <div id="stat-display">Waiting for data...</div>
            </div>
        </div>
        <!-- 右下：ログ -->
        <div class="panel">
            <div class="panel-header">SYSTEM LOG</div>
            <div class="panel-content">
                <div id="log-container"></div>
            </div>
        </div>
    </div>

    <script>
        const eventSource = new EventSource("/stream");
        const logContainer = document.getElementById("log-container");
        const statDisplay = document.getElementById("stat-display");
        const meshcatIframe = document.getElementById("meshcat-iframe");
        
        let iframeInitialized = false;

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            // 初回受信時にMeshcatのURLを自動設定
            if (!iframeInitialized && data.port) {
                const currentHost = window.location.hostname; // 例: xxx-8000.app.github.dev
                const meshcatHost = currentHost.replace("-8000", `-${data.port}`); 
                meshcatIframe.src = `https://${meshcatHost}/static/`;
                iframeInitialized = true;
                console.log("Meshcat URL set to port: " + data.port);
            }

            // ログの更新
            const logEntry = document.createElement("div");
            logEntry.textContent = `[Step ${data.step}] Reward: ${data.reward} - ${data.status}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;

            // 統計エリアの更新
            statDisplay.innerHTML = `
                <div style="font-size: 1.5em;">Step: ${data.step}</div>
                <div style="font-size: 1.5em; color: #f1c40f;">Reward: ${data.reward}</div>
            `;
        };
    </script>
</body>
</html>
