<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Robot Arm RL Dashboard</title>
    <style>
        /* CSS: 画面のレイアウトを整える */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #2c3e50; /* 背景色（濃いグレー） */
            color: #ecf0f1; /* 文字色（白に近いグレー） */
            font-family: sans-serif;
            overflow: hidden; /* 全体スクロールを防止 */
        }

        /* 画面全体を2x2のグリッドに分割 */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 左右に2分割 */
            grid-template-rows: 1fr 1fr;    /* 上下に2分割 */
            height: 100vh;                  /* 画面いっぱいの高さ */
            gap: 10px;                      /* エリア間の隙間 */
            padding: 10px;                  /* 外周の余白 */
            box-sizing: border-box;
        }

        /* 各エリアの共通設定 */
        .panel {
            background-color: #34495e;      /* パネルの背景色 */
            border-radius: 8px;             /* 角を少し丸くする */
            display: flex;
            flex-direction: column;
            overflow: hidden;               /* 中身がはみ出ないように */
            border: 1px solid #455a64;
        }

        /* パネルの見出し */
        .panel-header {
            padding: 8px 12px;
            background-color: #1a252f;
            font-size: 0.9em;
            font-weight: bold;
            color: #bdc3c7;
        }

        /* パネルの中身 */
        .panel-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Meshcatを表示するためのiframe */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 空白エリアのテキスト */
        .placeholder-text {
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 左上：ロボットシミュレーションエリア -->
        <div class="panel">
            <div class="panel-header">ROBOT SIMULATION (Meshcat)</div>
            <div class="panel-content">
                <!-- ここにMeshcatのURLを入れます -->
                <!-- Codespacesで実行しているMeshcatのURL（/static/付き）に書き換えてください -->
                <iframe src="https://miniature-broccoli-rr74qjj5xg5c5vvp-7000.app.github.dev/static/"></iframe>
            </div>
        </div>

        <!-- 右上：強化学習進行状況（予定） -->
        <div class="panel">
            <div class="panel-header">REWARD HISTORY</div>
            <div class="panel-content">
                <div class="placeholder-text">Coming Soon (Graph Area)</div>
            </div>
        </div>

        <!-- 左下：ネットワーク/パラメータ情報（予定） -->
        <div class="panel">
            <div class="panel-header">STATISTICS</div>
            <div class="panel-content">
                <div class="placeholder-text">Coming Soon (Data Area)</div>
            </div>
        </div>

        <!-- 右下：ログ/コンソール（予定） -->
        <div class="panel">
            <div class="panel-header">SYSTEM LOG</div>
            <div class="panel-content">
                <div class="placeholder-text">Coming Soon (Log Area)</div>
            </div>
        </div>
    </div>

</body>
</html>
